<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page contact-page">

    <div class="contact-header">
        <h1 class="page-title">CONTACT</h1>
        <p class="subtitle">Let’s build something meaningful together.</p>
    </div>

    <div class="contact-grid">

        <!-- Left: Contact Info -->
        <div class="contact-info">
            <p><strong>Email</strong><br>yourmail@example.com</p>
            <p><strong>Phone</strong><br>+91 XXXXX XXXXX</p>
            <p><strong>Location</strong><br>India</p>

            <div class="button-group">
                <span class="download-btn">DOWNLOAD RESUME</span>
                <span class="hire-btn">HIRE ME</span>
                <span class="back-btn" onclick="history.back()">Back</span>
            </div>
        </div>

        <!-- Right: Contact Form -->
        <form class="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">SEND MESSAGE</button>
        </form>

    </div>

</div>

</body>
</html>
